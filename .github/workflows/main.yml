name: ML Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install DVC
      run: pip install dvc

    - name: Pull data (optional if remote added)
      run: dvc pull || true

    - name: Run pipeline
      run: dvc repro